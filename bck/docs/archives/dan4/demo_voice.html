<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Demo — GMP Kompani</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #FB923C 0%, #C2410C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0F2A47; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 24px; }
        .mic-button {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: none;
            background: #FB923C;
            color: white;
            font-size: 48px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(251,146,60,0.4);
            transition: all 0.3s;
        }
        .mic-button:hover { transform: scale(1.05); }
        .mic-button.listening {
            background: #DC2626;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.7); }
            50% { box-shadow: 0 0 0 30px rgba(220,38,38,0); }
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #64748B;
            margin: 16px 0;
            min-height: 20px;
        }
        .conversation {
            margin-top: 24px;
            background: #F8FAFC;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
        }
        .message.user {
            background: #FB923C;
            color: white;
            margin-left: auto;
        }
        .message.assistant {
            background: white;
            border: 1px solid #E2E8F0;
            color: #0F2A47;
        }
        .label {
            font-size: 11px;
            font-weight: bold;
            opacity: 0.7;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #94A3B8;
        }
        .api-warning {
            background: #FEF3C7;
            border-left: 4px solid #B45309;
            padding: 12px;
            margin: 16px 0;
            font-size: 13px;
            color: #78350F;
            border-radius: 4px;
            display: none;
        }
        .api-warning.show { display: block; }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            margin-bottom: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 AI Voice Asistent</h1>
        <p class="subtitle">GMP Kompani — Govorite sa AI-jem umjesto kucanja</p>

        <input type="password" id="api-key" placeholder="Unesite Anthropic API ključ (sk-ant-...)" />

        <button class="mic-button" id="mic">🎤</button>
        <div class="status" id="status">Klikni mikrofon i govori...</div>

        <div id="api-warning" class="api-warning">
            ⚠ Nema API ključa — radi samo prepoznavanje govora, ne i AI odgovor.
        </div>

        <div class="conversation" id="conversation">
            <div class="message assistant">
                <div class="label">AI Asistent</div>
                Pozdrav. Pitaj me bilo šta o GMP Kompani — namještaj, cijene, dostava.
            </div>
        </div>

        <div class="footer">
            Web Speech API (besplatno) + Claude Haiku
        </div>
    </div>

    <script>
        // === PROVJERA BROWSERA ===
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const mic = document.getElementById("mic");
        const status = document.getElementById("status");
        const conversation = document.getElementById("conversation");
        const apiKeyInput = document.getElementById("api-key");
        const apiWarning = document.getElementById("api-warning");

        if (!SpeechRecognition) {
            mic.disabled = true;
            mic.style.opacity = "0.5";
            mic.style.cursor = "not-allowed";
            status.textContent = "❌ Vaš browser ne podržava Web Speech API. Koristi Chrome ili Edge.";
            status.style.color = "#DC2626";
            status.style.fontWeight = "bold";
        } else {
            // === SPEECH RECOGNITION (slušanje) ===
            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";  // BCS jezici
            recognition.continuous = false;
            recognition.interimResults = false;

            let listening = false;

            mic.addEventListener("click", () => {
                if (listening) {
                    recognition.stop();
                    return;
                }
                recognition.start();
                listening = true;
                mic.classList.add("listening");
                status.textContent = "🎤 Slušam...";
            });

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                addMessage("user", transcript);
                status.textContent = "🤔 Razmišljam...";

                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) {
                    apiWarning.classList.add("show");
                    addMessage("assistant", "(Nema API ključa - prepoznajem govor ali ne mogu odgovoriti)");
                    return;
                }

                apiWarning.classList.remove("show");
                const odgovor = await pitajClaude(transcript, apiKey);
                addMessage("assistant", odgovor);
                govori(odgovor);
            };

            recognition.onend = () => {
                listening = false;
                mic.classList.remove("listening");
                if (status.textContent.includes("Slušam")) {
                    status.textContent = "Klikni mikrofon i govori...";
                }
            };

            recognition.onerror = (event) => {
                status.textContent = `Greška: ${event.error}`;
                listening = false;
                mic.classList.remove("listening");
            };
        }

        // === CLAUDE API POZIV ===
        async function pitajClaude(pitanje, apiKey) {
            const SYSTEM = `Ti si AI asistent firme GMP Kompani iz Banja Luke.
GMP proizvodi namještaj - tri kolekcije: Alba, Royal, Minimal.
Odgovaraj na BCS jeziku, KRATKO (1-2 rečenice, max 30 riječi).
Ako pitanje nije o namještaju, ljubazno preusmjeri.`;

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": apiKey,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true"
                    },
                    body: JSON.stringify({
                        model: "claude-haiku-4-5-20251001",
                        max_tokens: 200,
                        system: SYSTEM,
                        messages: [{ role: "user", content: pitanje }]
                    })
                });
                const data = await response.json();
                if (data.error) return `Greška: ${data.error.message}`;
                return data.content[0].text;
            } catch (e) {
                return `Greška: ${e.message}`;
            }
        }

        // === SPEECH SYNTHESIS (govorenje) ===
        function govori(tekst) {
            if (!window.speechSynthesis) {
                status.textContent = "Klikni mikrofon i govori...";
                return;
            }
            const utterance = new SpeechSynthesisUtterance(tekst);
            utterance.lang = "hr-HR";
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            speechSynthesis.speak(utterance);
            status.textContent = "🔊 Govorim...";
            utterance.onend = () => {
                status.textContent = "Klikni mikrofon i govori...";
            };
        }

        function addMessage(role, text) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            const label = role === "user" ? "Vi" : "AI Asistent";
            const labelDiv = document.createElement("div");
            labelDiv.className = "label";
            labelDiv.textContent = label;
            div.appendChild(labelDiv);
            const textNode = document.createTextNode(text);
            div.appendChild(textNode);
            conversation.appendChild(div);
            conversation.scrollTop = conversation.scrollHeight;
        }
    </script>
</body>
</html>

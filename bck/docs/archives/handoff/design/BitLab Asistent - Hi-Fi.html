<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<title>BitLab AI Asistent — Hi-Fi Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="widget.css" />
<style>
  body { margin: 0; background: #0a0a14; font-family: 'Inter', sans-serif; }
  /* design-canvas overrides */
  .dc-artboard-frame { box-shadow: 0 24px 60px rgba(0,0,0,0.4); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="icons.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  return (
    <DesignCanvas title="BitLab AI Asistent — Hi-Fi Redesign" subtitle="Chat widget · Voice modal · 5 stanja">

      {/* ========== SECTION 1 — CHAT WIDGET STATES ========== */}
      <DCSection id="chat" title="Chat widget — stanja" subtitle="Kako asistent izgleda na webshop.bitlab.rs">

        {/* Closed — launcher on host page */}
        <DCArtboard id="closed" label="1. Zatvoreno (launcher)" width={1100} height={720}>
          <HostBackdrop>
            <div style={{ position: 'absolute', bottom: 32, right: 32 }}>
              <FloatingLauncher />
            </div>
          </HostBackdrop>
        </DCArtboard>

        {/* Welcome — first open */}
        <DCArtboard id="welcome" label="2. Otvoreno · prvi put" width={1100} height={720}>
          <HostBackdrop>
            <div style={{ position: 'absolute', bottom: 24, right: 24 }}>
              <ChatWindow state="welcome" />
            </div>
          </HostBackdrop>
        </DCArtboard>

        {/* Conversation */}
        <DCArtboard id="conversation" label="3. U razgovoru · proizvodi" width={1100} height={720}>
          <HostBackdrop>
            <div style={{ position: 'absolute', bottom: 24, right: 24 }}>
              <ChatWindow state="conversation" />
            </div>
          </HostBackdrop>
        </DCArtboard>

        {/* Typing */}
        <DCArtboard id="typing" label="4. Asistent kuca odgovor" width={1100} height={720}>
          <HostBackdrop>
            <div style={{ position: 'absolute', bottom: 24, right: 24 }}>
              <ChatWindow state="typing" />
            </div>
          </HostBackdrop>
        </DCArtboard>

      </DCSection>

      {/* ========== SECTION 2 — VOICE MODAL ========== */}
      <DCSection id="voice" title="Voice asistent — modal" subtitle="Glasovna pretraga, BHS jezici">

        <DCArtboard id="voice-idle" label="5. Voice · spremno" width={560} height={720}>
          <div style={{
            width: '100%', height: '100%',
            background: 'linear-gradient(180deg, rgba(26,26,46,0.55) 0%, rgba(26,26,46,0.85) 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 24, boxSizing: 'border-box',
          }}>
            <VoiceModal state="idle" />
          </div>
        </DCArtboard>

        <DCArtboard id="voice-listen" label="6. Voice · sluša korisnika" width={560} height={780}>
          <div style={{
            width: '100%', height: '100%',
            background: 'linear-gradient(180deg, rgba(26,26,46,0.55) 0%, rgba(26,26,46,0.85) 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 24, boxSizing: 'border-box',
          }}>
            <VoiceModal state="listening" />
          </div>
        </DCArtboard>

        <DCArtboard id="voice-speak" label="7. Voice · asistent govori" width={560} height={780}>
          <div style={{
            width: '100%', height: '100%',
            background: 'linear-gradient(180deg, rgba(26,26,46,0.55) 0%, rgba(26,26,46,0.85) 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 24, boxSizing: 'border-box',
          }}>
            <VoiceModal state="speaking" />
          </div>
        </DCArtboard>

      </DCSection>

      {/* ========== SECTION 3 — DESIGN SYSTEM ========== */}
      <DCSection id="ds" title="Design system" subtitle="Tokens & key components">

        <DCArtboard id="tokens" label="Tokens — boje, tipografija, sjenke" width={900} height={620}>
          <div style={{
            padding: 32, fontFamily: 'Inter, sans-serif',
            background: '#fff', height: '100%', boxSizing: 'border-box', overflow: 'hidden',
          }}>
            <div style={{ fontSize: 11, color: '#8b8b9a', textTransform: 'uppercase', letterSpacing: '0.12em', fontWeight: 600 }}>BitLab UI</div>
            <h2 style={{ fontSize: 28, fontWeight: 700, color: '#1a1a2e', margin: '6px 0 24px', letterSpacing: '-0.02em' }}>Design tokens</h2>

            {/* Palette */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, color: '#8b8b9a', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Boja</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[
                  ['#fb6d3b', 'Orange 500'],
                  ['#ea5c2a', 'Orange 600'],
                  ['#1a1a2e', 'Navy 900'],
                  ['#2a2a3e', 'Navy 700'],
                  ['#f7f8fa', 'Surface'],
                  ['#ececf0', 'Border'],
                  ['#16a34a', 'Success'],
                  ['#dc2626', 'Danger'],
                ].map(([bg, name]) => (
                  <div key={name} style={{ flex: 1 }}>
                    <div style={{ height: 56, background: bg, borderRadius: 10, border: '1px solid rgba(0,0,0,0.05)' }} />
                    <div style={{ fontSize: 11, fontWeight: 600, color: '#1a1a2e', marginTop: 6 }}>{name}</div>
                    <div style={{ fontSize: 10, color: '#8b8b9a', fontFamily: 'JetBrains Mono, monospace' }}>{bg}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Type */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, color: '#8b8b9a', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Tipografija — Inter</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: '#1a1a2e', letterSpacing: '-0.02em' }}>Display 28/700</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: '#1a1a2e' }}>Heading 18/700</div>
                <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a2e' }}>Body 14/500</div>
                <div style={{ fontSize: 12, fontWeight: 500, color: '#565666' }}>Caption 12/500</div>
              </div>
            </div>

            {/* Radius + shadow */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              <div>
                <div style={{ fontSize: 11, color: '#8b8b9a', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Radius</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {[8, 12, 18, 24].map(r => (
                    <div key={r} style={{
                      width: 56, height: 56, background: '#fff5f0',
                      border: '1px solid #fed1bb', borderRadius: r,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 11, color: '#fb6d3b', fontWeight: 600,
                    }}>{r}px</div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: '#8b8b9a', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Elevation</div>
                <div style={{ display: 'flex', gap: 12 }}>
                  <div style={{ width: 56, height: 56, background: '#fff', borderRadius: 10, boxShadow: '0 1px 2px rgba(26,26,46,0.04), 0 1px 1px rgba(26,26,46,0.03)' }} />
                  <div style={{ width: 56, height: 56, background: '#fff', borderRadius: 10, boxShadow: '0 4px 12px rgba(26,26,46,0.06), 0 2px 4px rgba(26,26,46,0.04)' }} />
                  <div style={{ width: 56, height: 56, background: '#fff', borderRadius: 10, boxShadow: '0 16px 40px rgba(26,26,46,0.12), 0 4px 12px rgba(26,26,46,0.06)' }} />
                  <div style={{ width: 56, height: 56, background: 'linear-gradient(135deg, #fb6d3b, #ea5c2a)', borderRadius: 10, boxShadow: '0 8px 24px rgba(251,109,59,0.32)' }} />
                </div>
              </div>
            </div>

          </div>
        </DCArtboard>

      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

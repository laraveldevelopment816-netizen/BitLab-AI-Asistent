# nginx config for the dashboard SPA.
#
# Caddy (the public-facing reverse proxy) routes /, /assets/*, and any
# unmatched paths to this server. /api/*, /v1/*, /health, /vnc/* are
# proxied directly to the router service by Caddy and never reach nginx.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed asset bundles
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes (react-router) all resolve to index.html
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    # Standard hardening
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

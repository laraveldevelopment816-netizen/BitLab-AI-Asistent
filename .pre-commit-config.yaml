# Pre-commit hooks za bitlab-ai-asistent.
# Instalacija: pip install pre-commit && pre-commit install
# Manuelno: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        require_serial: true
      - id: ruff-check
        name: ruff check (lint)
        entry: ruff check
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy (typecheck)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["app/", "evals/framework/"]
      - id: pytest-unit-fast
        name: pytest unit (brzi presjek)
        entry: pytest -m unit -q
        language: system
        types: [python]
        pass_filenames: false

<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8" />
  <title>BitLab AI Asistent — Pitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"

  <style>
    html, body {
      margin: 0;
      padding: 0;

      overflow: hidden;
    }

  </style>

  <script type="application/json" id="speaker-notes">
[
  "Predstavljamo BitLab AI Asistenta. Asistent radi na chat-u, glasu i e-mailu, nad cijelim katalogom od pet hiljada dvjesta sedamdeset osam proizvoda. Cilj prezentacije je da za deset minuta pokažem šta sistem radi, kako je provjeren i kako bi krenuo u rad. Brojka 5278 koju vidite desno nije primjer — to je stvarni katalog koji sam već indeksirao.",

  "Krenimo od polazišta. Imate hiljade proizvoda, dnevne upite na više kanala i ograničen prodajni tim. Svaki neodgovoreni upit posle radnog vremena je propušten razgovor. Tri brojke ovdje su jednostavne: katalog, kanali, dostupnost. Sve ostalo što ću pokazati gradi se na ovim brojevima.",

  "Asistent ima tri kanala koji dijele istu bazu znanja. Chat widget na sajtu — korisnik pita, dobije listu proizvoda sa cijenama i linkovima. Voice na materinjem jeziku — priča normalno, na bosanskom, srpskom ili hrvatskom, asistent odgovara glasom, sa pravilnim izgovorom cijena. E-mail auto-reply — klijent pošalje upit, za tridesetak sekundi stiže profesionalan odgovor; ako je B2B sa JIB-om, automatski eskalira na prodaju. Bitno je da sva tri kanala čitaju isti katalog i isti FAQ. Jedan izvor istine.",

  "Devedeset sekundi demoa, tri pitanja. Prvo na chatu — pitanje o SSD-u do 400 maraka, dobijem tri konkretna proizvoda. Drugo, glasom — tražim laptop do 1500 maraka za gaming. Asistent razumije i odgovara glasom. Treće, e-mail — B2B upit za firmu, asistent ne pokušava sam zatvoriti narudžbu, nego eskalira prodaji uz potpis. Mogu uživo pokazati ako želite poslije.",

  "Šta je odlučeno drugačije. Skala — radim nad cijelim katalogom, ne nad uzorkom. Kanali — tri, ne jedan. Jezik — native BCS, ne engleski sa prevodom. Hosting — vaš VPS, ne tuđi cloud. E-mail — automatizacija sa eskalacijom, što obično niko ne pravi. Kvalitet — postoji eval suite. Sigurnost — ključevi nikada ne idu u browser. Cijena rada — poznata unaprijed. Ovo je manje lista superlativa, više lista odluka koje su donesene rano.",

  "Kvalitet je provjeren, ne tvrden. Imam eval suite od osamnaest stvarnih BCS pitanja. Pokrivaju cijene, dostupnost, dostavu, B2B procedure. Ciljani rezultat je sedamnaest od osamnaest tačnih, devedeset četiri posto. Komandu možete pokrenuti i sami — log se piše, slučajevi se mogu reprodukovati. Ako se za tri mjeseca pojavi novo pitanje koje sistem promaši, dodaje se u suite i popravi.",

  "Kratko o tome kako je sastavljeno. Korisnik dolazi kroz jedan od tri kanala. AI mozak donosi odluku — šta da pretraži, kako da odgovori, da li treba eskalirati. Pretraga ide preko lokalne baze koja kombinuje semantiku i ključne riječi, pa razumije i parafrazu i šifru proizvoda. Sve komponente — pretraga, voice, automatizacija — rade lokalno na vašem VPS-u. Nema vendor lock-in-a.",

  "Sigurnost. Sistem radi na vašem serveru, vaši podaci ne odlaze trećim licima. Bez tunela, bez eksternih webhook-ova. API ključevi su isključivo na backend-u. Audit je prošao i otvoreni nalazi su zatvoreni prije produkcije. Ovo je najvažnije za B2B kupce koji pitaju gdje im idu podaci.",

  "Trošak rada. Otprilike trideset maraka mjesečno, manje od jedne narudžbe SSD-a. Razlog je jednostavan — AI tokeni su jedini varijabilni trošak. Hosting je već vaš. Voice, pretraga, automatizacija — sve open source. Cijena je predvidiva i skalira sa stvarnim saobraćajem.",

  "Status danas. Smart matching radi, eval suite je postavljen, security review prošao, deploy spreman, embed snippet je jedan red u head-u sajta. Sutra može u rad — čekamo zeleno svjetlo.",

  "Hvala. Otvoren sam za demo uživo, pitanja, ili da prođemo bilo koji slajd detaljnije. Kontakt podaci su tu. Pričekamo zeleno svjetlo i krećemo."
]
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="deck-stage.js"></script>
</head>
<body>
  <deck-stage width="1920" height="1080" id="stage"></deck-stage>

  <!-- Slide mounts -->
  <script>
    // Build 11 mount sections inside the deck-stage host
    (function () {
      const stage = document.getElementById('stage');
      const labels = [
        '01 Cover',
        '02 Polazi\u0161te',
        '03 Tri kanala',
        '04 90s demo',
        '05 Pristup',
        '06 Provjera',
        '07 Stack',
        '08 Sigurnost',
        '09 Tro\u0161ak',
        '10 Spremno',
        '11 Kontakt',
      ];
      labels.forEach((label, i) => {
        const sec = document.createElement('section');
        sec.setAttribute('data-label', label);
        sec.id = 'slide-' + i;
        sec.style.cssText =
          'width:100%;height:100%;background:#fff;display:block;overflow:hidden;';
        stage.appendChild(sec);
      });
    })();
  </script>

  <script type="text/babel" src="slides.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#fb6d3b",
      "navy": "#1a1a2e",
      "peach": "#fff5f0",
      "fontStack": "Inter",
      "showSlideNumbers": true,
      "differentiatorStyle": "checklist"
    }/*EDITMODE-END*/;

    function TweaksUI() {
      const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        // Apply live overrides to CSS variables and global C palette
        document.documentElement.style.setProperty('--accent', tw.accent);
        document.documentElement.style.setProperty('--navy', tw.navy);
        document.documentElement.style.setProperty('--peach', tw.peach);
        if (window.C) {
          window.C.orange = tw.accent;
          window.C.navy = tw.navy;
          window.C.peach = tw.peach;
        }
        document.body.style.fontFamily =
          tw.fontStack + ", -apple-system, sans-serif";
        // Force a re-render of all mounted slides
        window.__rerenderSlides && window.__rerenderSlides();
      }, [tw]);

      return (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Boje">
            <TweakColor
              label="Akcent"
              value={tw.accent}
              onChange={(v) => setTweak('accent', v)}
            />
            <TweakColor
              label="Tamna (navy)"
              value={tw.navy}
              onChange={(v) => setTweak('navy', v)}
            />
            <TweakColor
              label="Soft (peach)"
              value={tw.peach}
              onChange={(v) => setTweak('peach', v)}
            />
          </TweakSection>

          <TweakSection title="Tipografija">
            <TweakSelect
              label="Glavni font"
              value={tw.fontStack}
              options={[
                { value: 'Inter', label: 'Inter' },
                { value: 'Helvetica Neue', label: 'Helvetica' },
                { value: 'Georgia', label: 'Georgia (serif)' },
                { value: 'system-ui', label: 'System UI' },
              ]}
              onChange={(v) => setTweak('fontStack', v)}
            />
          </TweakSection>

          <TweakSection title="Stil slajdova">
            <TweakRadio
              label="Differentiator slajd"
              value={tw.differentiatorStyle}
              options={[
                { value: 'checklist', label: 'Checklist' },
                { value: 'table', label: 'Tabela' },
              ]}
              onChange={(v) => setTweak('differentiatorStyle', v)}
            />
          </TweakSection>
        </TweaksPanel>
      );
    }

    // Mount tweaks panel
    const tweaksRoot = document.createElement('div');
    document.body.appendChild(tweaksRoot);
    ReactDOM.createRoot(tweaksRoot).render(<TweaksUI />);

    // ----- Mount each slide into its section -----
    const slideComponents = [
      window.CoverSlide,
      window.ContextSlide,
      window.ChannelsSlide,
      window.DemoSlide,
      window.DifferentiatorSlide,
      window.EvalSlide,
      window.StackSlide,
      window.SecuritySlide,
      window.CostSlide,
      window.ReadySlide,
      window.ContactSlide,
    ];

    const total = slideComponents.length;
    const roots = [];

    slideComponents.forEach((Comp, i) => {
      const el = document.getElementById('slide-' + i);
      const root = ReactDOM.createRoot(el);
      roots.push({ root, Comp, i });
      root.render(<Comp index={i + 1} total={total} />);
    });

    window.__rerenderSlides = () => {
      roots.forEach(({ root, Comp, i }) => {
        root.render(<Comp index={i + 1} total={total} />);
      });
    };
  </script>
</body>
</html>

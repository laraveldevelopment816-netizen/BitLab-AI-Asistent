# BitLab AI Asistent — nginx site config
# Lokacija: /etc/nginx/sites-available/bitlab-ai
# Symlink:  /etc/nginx/sites-enabled/bitlab-ai
#
# Pretpostavke:
# - certbot je instaliran i SSL cert postavljen za <domain>
# - bitlab-ai.service sluša na 127.0.0.1:8000
# - dashboard/dist je na /var/www/bitlab-admin/

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name AI_DOMAIN_PLACEHOLDER;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name AI_DOMAIN_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/AI_DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/AI_DOMAIN_PLACEHOLDER/privkey.pem;

    # SSL settings (modern config — TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Body limit — STT audio do 25MB
    client_max_body_size 30M;
    client_body_timeout 60s;

    # Gzip text (ne audio/binary)
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml;
    gzip_min_length 1024;

    # ── Dashboard SPA (statički build) ───────────────────────────────
    location /admin/ {
        alias /var/www/bitlab-admin/;
        try_files $uri $uri/ /admin/index.html;

        # Long cache za hashed assets (Vite gradi sa hash-evima)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            alias /var/www/bitlab-admin/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API endpointi ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chat može trajati dugo (tool calls + LLM gen)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffering off za potencijalne SSE / streaming kasnije
        proxy_buffering off;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Widget statički fajlovi ──────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        # Cache widget.js u browseru 1h, ali rispetuj ETag/Last-Modified
        expires 1h;
    }

    # ── Root: chat widget demo (FastAPI servira public/widget.html) ──
    location = / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── n8n (ako se hostuje istom mašinom — opcionalno) ──────────────
    # location /n8n/ {
    #     proxy_pass http://127.0.0.1:5678/;
    #     proxy_set_header Host $host;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # Logs
    access_log /var/log/nginx/bitlab-ai.access.log;
    error_log  /var/log/nginx/bitlab-ai.error.log warn;
}
